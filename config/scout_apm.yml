# Scout APM configuration.
# Keys are read from env vars (env vars override this file), so no secret is
# committed — important because this repo is public. Set them in .env (local)
# and in Render (production):
#   SCOUT_KEY            – org key (Settings screen)
#   SCOUT_MONITOR        – "true" to report
#   SCOUT_LOGS_ENABLED   – "true" to forward logs to Scout
#   SCOUT_LOG_INGEST_KEY – app-specific key from Scout's Logs tab (after deploy)
common: &defaults
  name: MerchantOS
  key: <%= ENV["SCOUT_KEY"] %>
  monitor: <%= ENV.fetch("SCOUT_MONITOR", "false") %>
  errors_enabled: true
  # Only forward logs when an ingest key is actually present. During the Docker
  # build (assets:precompile boots the app) the runtime env vars aren't set, so the
  # key is blank — keep logs off there, or scout_apm_logging's OpenTelemetry setup
  # raises on the empty attribute and fails the build.
  logs_monitor: <%= ENV["SCOUT_LOG_INGEST_KEY"].to_s.strip.empty? ? false : ENV.fetch("SCOUT_LOGS_MONITOR", "true") %>
  logs_ingest_key: <%= ENV["SCOUT_LOG_INGEST_KEY"] %>

production:
  <<: *defaults
  monitor: <%= ENV.fetch("SCOUT_MONITOR", "true") %>

development:
  <<: *defaults

test:
  <<: *defaults
  monitor: false
  logs_monitor: false
