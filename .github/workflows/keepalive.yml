name: Keep alive

# Render's free tier sleeps after 15 min idle. Ping it every 10 min to keep
# the demo warm. (GitHub cron can drift a few minutes, which is fine here.)
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: # lets you run it manually too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the app
        run: curl -fsS https://merchant-os.onrender.com/up
